<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>商品列表</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
    header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;box-shadow:0 2px 6px #eee}
    .logo{font-size:20px;font-weight:bold;color:#1677ff}
    input{padding:8px 12px;border:1px solid #ddd;border-radius:4px;width:260px}
    button{padding:8px 14px;background:#1677ff;color:white;border:none;border-radius:4px;cursor:pointer}
    main{max-width:1300px;margin:20px auto;padding:0 20px}
    h2{text-align:center;margin-bottom:16px}
    table{width:100%;border-collapse:collapse;table-layout: fixed;overflow: hidden;white-space: nowrap;}
    th,td{border:1px solid #ddd;padding:12px;text-align:center}
    th{background:#1677ff;color:white}
    img{width:80px;height:80px;object-fit:cover;border-radius:4px}
    .total{text-align:right;margin-top:16px;font-size:16px;font-weight:bold}
  </style>
</head>
<body>
<header>
  <div class="logo">商品展示系统</div>
  <div class="search-bar">
    <input placeholder="搜索商品" oninput="search()">
    <button onclick="location.href='login.html'">管理员登录</button>
  </div>
</header>
<main>
  <h2>商品列表</h2>
  <table>
    <tr><th>序号</th><th>图片</th><th>名称</th><th>编号</th><th>数量</th><th>单价</th><th>小计</th></tr>
    <tbody id="productList"></tbody>
  </table>
  <div class="total" id="total"></div>
</main>

<script>
const API = 'http://localhost:3001';
let products = [];

async function load(key = '') {
  try {
    const res = await fetch(`${API}/api/products?search=${key}`);
    products = await res.json();
    render();
  } catch (err) {
    alert("加载商品失败：" + err);
  }
}

function render() {
  console.log('Rendering products:', products);
  let html = '';
  let total = 0;

  if (!products || products.length === 0) {
    document.getElementById('productList').innerHTML = '<tr><td colspan="7">暂无商品数据</td></tr>';
    document.getElementById('total').innerText = '总计：0.00 元';
    return;
  }

  products.forEach((p, i) => {
    let imgUrl = p.image_url || 'https://picsum.photos/80/80';
    if (imgUrl.startsWith('/uploads')) imgUrl = API + imgUrl;

    // ✅ 核心修复：强制转换 price 为数字，处理空值/字符串
    const price = Number(p.price) || 0;
    const qInput = document.getElementById(`qty_${i}`);
    const q = qInput ? Math.max(0, Number(qInput.value)) : 0;
    const sub = price * q;
    total += sub;

    html += `
        <tr>
            <td>${i + 1}</td>
            <td><img src="${imgUrl}"></td>
            <td>${p.name}</td>
            <td>${p.code}</td>
            <td><input id="qty_${i}" type="number" value="${q}" min="0" style="width:60px" onchange="calc()"></td>
            <td>${price.toFixed(2)}</td>
            <td>${sub.toFixed(2)}</td>
        </tr>`;
    });
    document.getElementById('productList').innerHTML = html;
    document.getElementById('total').innerText = '总计：' + total.toFixed(2) + ' 元';
}

function search() {
  const v = document.querySelector('.search-bar input').value;
  load(v);
}

function calc() { render(); }
load();
</script>
</body>
</html>

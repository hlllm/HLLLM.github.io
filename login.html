<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理员登录</title>
  <style>
    body{background:#f5f5f5}
    .login-box{width:360px;background:white;margin:120px auto;padding:30px;border-radius:8px;box-shadow:0 2px 10px #00000010}
    h2{text-align:center;margin-bottom:20px}
    input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:4px}
    button{width:100%;padding:12px;background:#1677ff;color:white;border:none;border-radius:4px;margin-top:10px;cursor:pointer}
  </style>
</head>
<body>
<div class="login-box">
  <h2>管理员登录</h2>
  <input id="username" placeholder="账号" >
  <input id="password" type="password" placeholder="密码" >
  <button onclick="login()">登录</button>
</div>

<script>
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  
  if (!username || !password) {
    alert('请输入账号密码');
    return;
  }

  try {
    const res = await fetch('http://localhost:3001/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    
    if (data.success) {
      alert('登录成功！');
      location.href = 'admin.html';
    } else {
      alert('账号或密码错误');
    }
  } catch (e) {
    alert('请先启动服务！');
  }
}
</script>
</body>
</html>
